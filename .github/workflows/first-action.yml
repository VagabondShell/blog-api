name: test project
on:
  [push, workflow_dispatch]

jobs:
   test-job:
      runs-on: ubuntu-latest 
      steps:
      - name: Get-code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci 
      - name: Run tests
        run: npm test 
   deploy-job:
      needs: test-job
      runs-on: ubuntu-latest
      steps:
      - name: Get-code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci 
      - name: deploy       
        run: echo "deploying to aws"

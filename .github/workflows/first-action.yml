name: test project
on:
  push
jobs:
   test-job:
      runs-on: ubuntu-latest
      steps:
      - name: Get-code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci 
      - name: Run tests
        run: npm test 
   deploy-job:
      runs-on: ubuntu-latest
      steps:
      - name: Get-code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci 
      - name: deploy       
        run: echo "deploying to aws"
